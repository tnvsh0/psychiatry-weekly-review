name: 🔄 NotebookLM Session Keepalive (DISABLED)

# DISABLED 2026-05-07. Do NOT re-enable.
#
# This workflow ran from GitHub Actions runners (Azure IPs that change every
# run). Pinging NotebookLM from those IPs caused Google to invalidate the
# session — the workflow was actively making things worse, not better.
# Worse, the script does `exit 0` even on auth failure, so CI showed green
# while the session was dead.
#
# The current architecture runs keepalive from inside the VM itself, where
# the static IP matches the IP the user logged in from.
# See vm/run_keepalive.sh.

on:
  workflow_dispatch:   # manual only — kept for emergencies

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Disabled. Keepalive runs from inside the VM (vm/run_keepalive.sh)."
          echo "Running this workflow from GitHub IPs invalidates the session."
