name: Deploy to Cloud Run

# Triggered on every push to main that touches code or Dockerfile.
# Uses gcloud builds submit (Cloud Build) - no local Docker required.

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PROJECT:    ${{ secrets.GCP_PROJECT }}
      REGION:     ${{ secrets.GCP_REGION }}
      JOB_NAME:   psychiatry-weekly-review
      IMAGE_BASE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/psychiatry/psychiatry-weekly-review

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Build and push via Cloud Build (runs on GCP, no Docker daemon needed)
      - name: Build and push image via Cloud Build
        run: |
          gcloud builds submit . \
            --tag="${{ env.IMAGE_BASE }}:${{ github.sha }}" \
            --project=${{ env.PROJECT }}
          # Also tag as latest
          gcloud artifacts docker tags add \
            "${{ env.IMAGE_BASE }}:${{ github.sha }}" \
            "${{ env.IMAGE_BASE }}:latest"

      - name: Update Cloud Run Job
        run: |
          gcloud run jobs update ${{ env.JOB_NAME }} \
            --image="${{ env.IMAGE_BASE }}:${{ github.sha }}" \
            --region=${{ env.REGION }} \
            --quiet
          echo "Cloud Run Job updated to SHA ${{ github.sha }}"
